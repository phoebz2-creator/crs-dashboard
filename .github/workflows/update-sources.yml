name: Update Policy Research Sources

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify Congress API secret
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          if [ -n "$CONGRESS_API_KEY" ]; then
            echo "CONGRESS_API_KEY detected for workflow."
          else
            echo "CONGRESS_API_KEY is missing for workflow."
            exit 1
          fi

      - name: Update policy research data
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python update_sources.py

      - name: Commit updated sources.json
        run: |
          if git diff --quiet -- sources.json; then
            echo "sources.json did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources.json
          git commit -m "Update policy research sources"
          git push origin HEAD:main
